<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" role="img" aria-label="بنهاوي">
    <defs>
        <linearGradient id="bh-mark" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#0D9488"/>
            <stop offset="100%" stop-color="#0E7C72"/>
        </linearGradient>
        <linearGradient id="bh-glow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".25"/>
            <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <!-- Mark: rounded square holding a stylised pin + the Arabic letter "ب" -->
    <g>
        <rect x="6" y="6" width="48" height="48" rx="14" fill="url(#bh-mark)"/>
        <rect x="6" y="6" width="48" height="24" rx="14" fill="url(#bh-glow)"/>

        <!-- Map pin shape -->
        <path d="M30 14c-6.6 0-12 5.4-12 12 0 9 12 18 12 18s12-9 12-18c0-6.6-5.4-12-12-12z"
              fill="#FFFFFF" opacity=".22"/>
        <!-- Pin core dot -->
        <circle cx="30" cy="26" r="4" fill="#FFFFFF"/>
        <!-- "Banha" letter ب stylised inside the pin -->
        <path d="M22 36h16M26 36c0-1.2.9-2.2 2.1-2.2h3.8c1.2 0 2.1 1 2.1 2.2"
              stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" fill="none"/>
        <circle cx="35" cy="40.5" r="1.4" fill="#FFFFFF"/>
    </g>

    <!-- Wordmark (Arabic) -->
    <g font-family="Cairo, system-ui, sans-serif" font-weight="900" fill="#001B2A">
        <text x="64" y="38" font-size="26" letter-spacing="-.5">بنهاوي</text>
        <text x="64" y="51" font-size="9" font-weight="700" fill="#5E6A77" letter-spacing=".2">دليل أنشطة بنها</text>
    </g>
</svg>
